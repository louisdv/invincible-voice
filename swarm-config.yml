services:
  traefik:
    image: traefik:v3.6.7
    command:
      # Swarm provider configuration
      - "--providers.swarm.endpoint=unix:///var/run/docker.sock"
      - "--providers.swarm.exposedByDefault=false"

      # EntryPoints for HTTP and HTTPS
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"

      # Redirect HTTP to HTTPS
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"

      # Let's Encrypt configuration
      - "--certificatesResolvers.letsencrypt.acme.httpChallenge.entryPoint=web"
      - "--certificatesResolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesResolvers.letsencrypt.acme.email=gabriel@kyutai.org"
      - "--certificatesResolvers.letsencrypt.acme.httpChallenge=true"
      - "--log.level=TRACE"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - letsencrypt:/letsencrypt
    deploy:
      placement:
        constraints:
          - node.role == manager

  frontend:
    image: rg.fr-par.scw.cloud/namespace-unruffled-tereshkova/invincible-voice-frontend:${COMMIT_SHA}
    build:
      context: services/frontend/
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.frontend.rule=Host(`invincible-voice.kyutai.org`) && PathPrefix(`/`)"
        - "traefik.http.routers.frontend.entrypoints=websecure"
        - "traefik.http.routers.frontend.tls=true"
        - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
        - "traefik.http.services.frontend.loadbalancer.server.port=3000"
        - "traefik.http.routers.frontend.priority=10"

  backend:
    image: rg.fr-par.scw.cloud/namespace-unruffled-tereshkova/invincible-voice-backend:${COMMIT_SHA}
    build:
      context: services/backend
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - TTS_LOCK_TTL_SECONDS=300
      - STT_LOCK_TTL_SECONDS=600
      - KYUTAI_LLM_URL=https://openrouter.ai/api/v1
      - KYUTAI_LLM_API_KEY=${KYUTAI_LLM_API_KEY}
      - KYUTAI_LLM_MODEL=@preset/invincible-voice
      - KYUTAI_USERS_DATA_PATH=s3://invincible-voice
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GRADIUM_API_KEY=${GRADIUM_API_KEY}
      # TODO: allow dynamic voice selection
      - TTS_VOICE_ID=${TTS_VOICE_ID}
      - STT_IS_GRADIUM=true
      - KYUTAI_STT_URL=wss://eu.api.gradium.ai/api/speech/asr
      - TTS_IS_GRADIUM=true
      - TTS_SERVER=https://eu.api.gradium.ai/api/
      - ALLOW_PASSWORD=false
      - AWS_ENDPOINT_URL=${AWS_ENDPOINT_URL}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    deploy:
      replicas: ${BACKEND_REPLICAS_COUNT}
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.backend.rule=Host(`invincible-voice.kyutai.org`) && PathPrefix(`/api`)"
        - "traefik.http.routers.backend.middlewares=strip-api"
        - "traefik.http.middlewares.strip-api.replacepathregex.regex=^/api/(.*)"
        - "traefik.http.middlewares.strip-api.replacepathregex.replacement=/$$1"
        - "traefik.http.routers.backend.entrypoints=websecure"
        - "traefik.http.routers.backend.tls=true"
        - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
        - "traefik.http.services.backend.loadbalancer.server.port=80"
        - "traefik.http.routers.backend.priority=100"
        - "traefik.http.routers.block-metrics.rule=Host(`invincible-voice.kyutai.org`) && Path(`/api/metrics`)"
        - "traefik.http.routers.block-metrics.priority=300"
        - "traefik.http.routers.block-metrics.service=noop@internal"
        - "traefik.http.routers.block-metrics.entrypoints=websecure"
        - "prometheus-port=80"

  redis:
    image: redis:8-alpine
    labels:
      - "traefik.enable=false"

# -----------------------------------------------------
# Monitoring

  agent:
    image: portainer/agent:lts
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    networks:
      - agent_network
    deploy:
      mode: global

  portainer:
    image: portainer/portainer-ce:lts
    command: -H tcp://tasks.agent:9001 --tlsskipverify
    ports:
      - "9443:9443"
    volumes:
      - portainer_data:/data
    networks:
      - agent_network
    deploy:
      placement:
        constraints: [node.role == manager]

  prometheus:
    image: rg.fr-par.scw.cloud/namespace-unruffled-tereshkova/invincible-voice-prometheus:${COMMIT_SHA}
    volumes:
      - prometheus-data:/prometheus
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    labels:
      - "traefik.enable=false"
    deploy:
      placement:
        constraints: [node.role == manager]

  grafana:
    image: rg.fr-par.scw.cloud/namespace-unruffled-tereshkova/invincible-voice-grafana:${COMMIT_SHA}
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=
      - GF_SERVER_ROOT_URL=https://invincible-voice.kyutai.org/grafana
    labels:
      - "traefik.enable=true"
      - "pub_port=80"
      - "traefik.http.routers.grafana.rule=Host(`invincible-voice.kyutai.org`) && PathPrefix(`/grafana`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.routers.grafana.middlewares=grafana-strip"
      - "traefik.http.middlewares.grafana-strip.stripprefix.prefixes=/grafana"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    deploy:
      placement:
        constraints: [node.role == manager]

volumes:
  letsencrypt:
  portainer_data:
  prometheus-data:
  grafana-data:

networks:
  agent_network:
    driver: overlay
    attachable: true
    driver_opts:
      encrypted: "true"
  default:
    driver: overlay
    attachable: true
    driver_opts:
      encrypted: "true"